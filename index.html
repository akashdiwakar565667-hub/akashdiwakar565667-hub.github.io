<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVerse</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Background -->
    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">🎬 MovieVerse</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Movies</a>
            <a href="#">Series</a>
            <a href="#">Trending</a>
        </nav>
    </header>

    <!-- Hero -->
    <main class="hero">

        <div class="glass-box">

            <h1>Unlimited Movies & Series</h1>

            <p>
                Watch the latest Movies and TV Shows in a premium cinematic experience.
            </p>

            <div class="search-box">
                <input type="text" placeholder="Search Movies...">
                <button>Search</button>
            </div>

        </div>

    </main>

    <!-- Trending Movies -->
    <section class="movies-section">

        <h2>🔥 Trending Movies</h2>

        <div class="movie-grid" id="movie-container">

        </div>

    </section>

    <footer class="footer">
        <div class="footer-content">
            <h2>🎬 MovieVerse</h2>

            <p>Your premium movie discovery experience.</p>

            <div class="footer-links">
                <a href="#">Home</a>
                <a href="#">Movies</a>
                <a href="#">Series</a>
                <a href="#">Contact</a>
            </div>

            <p class="copyright">
                © 2026 MovieVerse. All Rights Reserved.
            </p>
        </div>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
