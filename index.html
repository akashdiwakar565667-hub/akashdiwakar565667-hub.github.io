<!DOCTYPE html>
<html>
<head>
<title>FleetFlix Anime</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
color:red;
font-size:32px;
padding:15px;
font-weight:bold;
text-align:center;
}

.searchBox{
text-align:center;
margin-top:25px;
}

.searchBox input{
padding:12px;
width:250px;
font-size:16px;
border:none;
border-radius:6px;
outline:none;
margin:5px;
}

.searchBox button{
padding:12px 20px;
font-size:16px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:5px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.07);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:15px;
text-align:center;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:40px;
}
</style>
</head>

<body>

<header>ABHISHEK BHAI JINDABAAD</header>

<div class="searchBox">

<!-- Anime -->
<input id="animeInput" placeholder="Search Anime...">
<button onclick="searchAnime()">Anime</button>

<!-- Movies -->
<input id="movieInput" placeholder="Search Movies...">
<button onclick="searchMovies()">Movies</button>

</div>

<h2 style="padding-left:20px;">Top Anime</h2>

<div class="container" id="anime"></div>

<footer>AURA OF FLEET BHAI Anime Library</footer>

<script>

// ✅ Anime Search
function searchAnime(){
let q=document.getElementById("animeInput").value.trim()
if(q!==""){
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(q)
}
}

// ✅ Movie Search (SMART FIX)
function searchMovies(){
let q=document.getElementById("movieInput").value.trim()

if(q!==""){
// try working URL
window.location.href="https://net22.cc/home?keyword="+encodeURIComponent(q)

// fallback (agar site block kare)
setTimeout(()=>{
window.open("https://net22.cc/home","_blank")
},1500)
}
}

// ✅ ENTER KEY FIX (keyup use kiya)
document.getElementById("animeInput").addEventListener("keyup",function(e){
if(e.key==="Enter"){
searchAnime()
}
})

document.getElementById("movieInput").addEventListener("keyup",function(e){
if(e.key==="Enter"){
searchMovies()
}
})

// ✅ Anime List
const animeList=[
{name:"Naruto",img:"https://cdn.myanimelist.net/images/anime/13/17405.jpg"},
{name:"Attack on Titan",img:"https://cdn.myanimelist.net/images/anime/10/47347.jpg"},
{name:"Demon Slayer",img:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg"},
{name:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/anime/1171/109222.jpg"},
{name:"One Piece",img:"https://cdn.myanimelist.net/images/anime/6/73245.jpg"},
{name:"Death Note",img:"https://cdn.myanimelist.net/images/anime/9/9453.jpg"},
{name:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/anime/1806/126216.jpg"},
{name:"Blue Lock",img:"https://cdn.myanimelist.net/images/anime/1258/126929.jpg"},
{name:"Vinland Saga",img:"https://cdn.myanimelist.net/images/anime/1500/103005.jpg"},
{name:"Spy x Family",img:"https://cdn.myanimelist.net/images/anime/1441/122795.jpg"}
]

// ✅ Render Cards
const container=document.getElementById("anime")

animeList.forEach(a=>{
let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${a.img}">
<h3>${a.name}</h3>
`

// 👉 Anime click
card.onclick=()=>{
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(a.name)
}

container.appendChild(card)
})

</script>

</body>
</html>
