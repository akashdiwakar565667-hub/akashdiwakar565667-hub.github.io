<!DOCTYPE html>
<html>
<head>
<title>StreamFlix Anime</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
color:red;
font-size:32px;
padding:15px;
font-weight:bold;
}

h2{
padding-left:20px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:18px;
padding:20px;
}

.card{
background:#1a1a1a;
padding:12px;
border-radius:8px;
cursor:pointer;
transition:0.3s;
text-align:center;
}

.card:hover{
transform:scale(1.07);
background:#262626;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:40px;
}

</style>

</head>

<body>

<header>STREAMFLIX</header>

<h2>Top 100 Anime</h2>

<div class="container" id="anime"></div>

<footer>StreamFlix Anime Library</footer>

<script>

const animeList=[

"Naruto","Naruto Shippuden","One Piece","Attack on Titan","Demon Slayer",
"Jujutsu Kaisen","Death Note","Dragon Ball","Dragon Ball Z","Dragon Ball Super",
"Fullmetal Alchemist Brotherhood","Tokyo Ghoul","Hunter x Hunter",
"Black Clover","Bleach","Chainsaw Man","My Hero Academia","Spy x Family",
"Vinland Saga","Solo Leveling","Blue Lock","Haikyuu","Steins Gate",
"Code Geass","Mob Psycho 100","One Punch Man","Re Zero","Fairy Tail",
"Sword Art Online","Dr Stone","Akame ga Kill","Gintama","Boruto",
"Tokyo Revengers","Fire Force","No Game No Life","Overlord","Parasyte",
"Assassination Classroom","Great Teacher Onizuka","JoJo Bizarre Adventure",
"Cowboy Bebop","Neon Genesis Evangelion","Psycho Pass","Bungo Stray Dogs",
"Made in Abyss","Kuroko no Basket","Food Wars","Seven Deadly Sins",
"Black Lagoon","Hellsing Ultimate","Erased","Angel Beats","Clannad",
"Clannad After Story","Toradora","Your Lie in April","Horimiya",
"Kaguya Sama Love is War","Darling in the Franxx","Future Diary",
"Another","Monster","The Promised Neverland","Ranking of Kings",
"86 Eighty Six","Akira","Trigun","Samurai Champloo","Dororo",
"Inuyasha","Noragami","Golden Kamuy","Dorohedoro","Devilman Crybaby",
"Beastars","Great Pretender","Vivy Fluorite Eye Song","Cyberpunk Edgerunners",
"Blue Exorcist","Mushoku Tensei","The Rising of the Shield Hero",
"That Time I Got Reincarnated as a Slime","Classroom of the Elite",
"The Eminence in Shadow","Zom 100","Hell's Paradise",
"Call of the Night","Tomodachi Game","Undead Unluck",
"Oshi no Ko","Frieren Beyond Journey End","Pluto",
"Heavenly Delusion","Wind Breaker","Mashle Magic and Muscles",
"Shangri La Frontier"

]

const container=document.getElementById("anime")

animeList.forEach(a=>{

let card=document.createElement("div")
card.className="card"
card.innerHTML="<h3>"+a+"</h3>"

card.onclick=()=>{
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(a)
}

container.appendChild(card)

})

</script>

</body>
</html>
