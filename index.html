<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stick Hero Final</title>

<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

canvas {
  background: linear-gradient(#87CEEB, #e0f7ff);
  border-radius: 10px;
}

/* CENTER START SCREEN */
#startScreen {
  position: absolute;
  text-align: center;
}

button {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 6px;
  background: red;
  color: white;
  cursor: pointer;
}

#restartBtn {
  display: none;
}

.controls {
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="startScreen">
  <h2>🎮 Stick Hero</h2>
  <button id="startBtn">Start Game</button>
</div>

<canvas id="gameCanvas" width="375" height="375"></canvas>

<div class="controls">
  <button id="restartBtn">Restart</button>

  <select id="skinSelect">
    <option value="black">Black</option>
    <option value="red">Red</option>
    <option value="blue">Blue</option>
    <option value="green">Green</option>
  </select>
</div>

<script>
// ===== SETUP =====
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const startScreen = document.getElementById("startScreen");
const startBtn = document.getElementById("startBtn");
const restartBtn = document.getElementById("restartBtn");
const skinSelect = document.getElementById("skinSelect");

const W = 375, H = 375, PH = 100;

// ===== STATE =====
let phase = "start";
let heroX=50, heroY=0, sceneOffset=0;
let platforms=[], sticks=[];
let score=0, step=0;
let heroColor="black";

// ===== INIT =====
function setup() {
  heroX=50;
  heroY=0;
  sceneOffset=0;
  score=0;
  step=0;

  platforms=[
    {x:50,w:50},
    {x:200,w:60}
  ];

  sticks=[
    {x:100,length:0,rotation:0}
  ];
}

// ===== START =====
startBtn.onclick = () => {
  startScreen.style.display="none";
  setup();
  phase="waiting";
};

// ===== RESTART =====
restartBtn.onclick = () => {
  setup();
  phase="waiting";
  restartBtn.style.display="none";
};

// ===== SKIN =====
skinSelect.onchange = () => heroColor = skinSelect.value;

// ===== LOOP =====
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// ===== UPDATE =====
function update(){
  if(phase==="start" || phase==="gameover") return;

  let stick = sticks[sticks.length-1];

  if(phase==="stretching") stick.length+=3;

  if(phase==="turning"){
    if(stick.rotation<90) stick.rotation+=5;
    else phase="walking";
  }

  if(phase==="walking"){
    heroX+=2;
    step+=0.2;

    let target = platforms[1];

    if(heroX > stick.x + stick.length) phase="falling";

    if(heroX > target.x && heroX < target.x + target.w){
      score++;
      next();
    }
  }

  if(phase==="falling"){
    heroY+=5;
    if(heroY>H){
      phase="gameover";
      restartBtn.style.display="inline-block";
    }
  }
}

// ===== NEXT =====
function next(){
  sceneOffset+=120;
  platforms.shift();

  let newX = platforms[0].x + 100 + Math.random()*120;
  let newW = 30 + Math.random()*50;

  platforms.push({x:newX,w:newW});
  sticks.push({x:platforms[0].x+platforms[0].w,length:0,rotation:0});

  heroX = platforms[0].x + platforms[0].w - 10;
  phase="waiting";
}

// ===== DRAW =====
function draw(){
  ctx.clearRect(0,0,W,H);

  ctx.fillStyle="black";
  platforms.forEach(p=>{
    ctx.fillRect(p.x - sceneOffset, H-PH, p.w, PH);
  });

  let s = sticks[sticks.length-1];
  ctx.save();
  ctx.translate(s.x - sceneOffset, H-PH);
  ctx.rotate(s.rotation*Math.PI/180);
  ctx.fillRect(0,-s.length,5,s.length);
  ctx.restore();

  drawHero();

  ctx.fillStyle="black";
  ctx.fillText("Score: "+score,10,20);

  if(phase==="gameover"){
    ctx.fillText("Game Over",130,150);
  }
}

// ===== HERO =====
function drawHero(){
  let x = heroX - sceneOffset;
  let y = H-PH + heroY;

  ctx.save();
  ctx.translate(x,y);

  ctx.strokeStyle=heroColor;
  ctx.fillStyle=heroColor;
  ctx.lineWidth=3;

  ctx.beginPath();
  ctx.moveTo(10,-20);
  ctx.lineTo(10,-5);
  ctx.stroke();

  ctx.beginPath();
  ctx.arc(10,-25,5,0,Math.PI*2);
  ctx.fill();

  let swing = Math.sin(step)*5;

  ctx.beginPath();
  ctx.moveTo(10,-5);
  ctx.lineTo(5+swing,5);
  ctx.moveTo(10,-5);
  ctx.lineTo(15-swing,5);
  ctx.stroke();

  ctx.restore();
}

// ===== CONTROLS =====
function startAction(){
  if(phase==="waiting") phase="stretching";
}
function endAction(){
  if(phase==="stretching") phase="turning";
}

window.addEventListener("mousedown", startAction);
window.addEventListener("mouseup", endAction);

window.addEventListener("touchstart", e=>{e.preventDefault();startAction();});
window.addEventListener("touchend", e=>{e.preventDefault();endAction();});

// ===== START LOOP =====
loop();
</script>

</body>
</html>
