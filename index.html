<!DOCTYPE html>
<html>
<head>
<title>Ultimate Racing Game</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
overflow:hidden;
}

#menu{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:white;
text-align:center;
}

button{
padding:12px 25px;
font-size:20px;
cursor:pointer;
margin:5px;
}

#score{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:22px;
}

#gameArea{
width:400px;
height:600px;
margin:auto;
background:url("https://images.unsplash.com/photo-1503376780353-7e6692767b70");
background-size:cover;
position:relative;
overflow:hidden;
display:none;
}

.roadLine{
width:10px;
height:100px;
background:white;
position:absolute;
left:195px;
}

#player{
width:50px;
height:90px;
position:absolute;
bottom:20px;
left:175px;
}

.enemy{
width:50px;
height:90px;
position:absolute;
top:-100px;
}

#mobileControls{
position:absolute;
bottom:10px;
width:100%;
text-align:center;
display:none;
}

.controlBtn{
font-size:25px;
padding:10px 20px;
margin:5px;
}

</style>
</head>

<body>

<div id="menu">
<h1>Ultimate Racing Game</h1>
<button onclick="startGame()">START</button>
</div>

<div id="score">Score: 0</div>

<div id="gameArea">
<img id="player" src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
</div>

<div id="mobileControls">
<button class="controlBtn" onclick="moveLeft()">⬅</button>
<button class="controlBtn" onclick="moveRight()">➡</button>
</div>

<script>

let gameArea=document.getElementById("gameArea");
let player=document.getElementById("player");

let score=0;
let speed=5;
let playerX=175;
let running=false;

let lanes=[40,175,310];

document.addEventListener("keydown",control);

function startGame(){

document.getElementById("menu").style.display="none";

gameArea.style.display="block";

document.getElementById("mobileControls").style.display="block";

createRoad();

running=true;

setInterval(createEnemy,1200);

gameLoop();

}

function control(e){

if(!running) return;

if(e.key==="ArrowLeft") moveLeft();

if(e.key==="ArrowRight") moveRight();

}

function moveLeft(){

let index=lanes.indexOf(playerX);

if(index>0){

playerX=lanes[index-1];

player.style.left=playerX+"px";

}

}

function moveRight(){

let index=lanes.indexOf(playerX);

if(index<2){

playerX=lanes[index+1];

player.style.left=playerX+"px";

}

}

function createRoad(){

for(let i=0;i<5;i++){

let line=document.createElement("div");

line.classList.add("roadLine");

line.style.top=(i*150)+"px";

gameArea.appendChild(line);

}

}

function moveRoad(){

let lines=document.querySelectorAll(".roadLine");

lines.forEach(function(line){

let top=parseInt(line.style.top);

top+=speed;

if(top>600) top=-100;

line.style.top=top+"px";

});

}

function createEnemy(){

let enemy=document.createElement("img");

let cars=[
"https://cdn-icons-png.flaticon.com/512/743/743007.png",
"https://cdn-icons-png.flaticon.com/512/744/744465.png"
];

enemy.src=cars[Math.floor(Math.random()*cars.length)];

enemy.classList.add("enemy");

enemy.style.left=lanes[Math.floor(Math.random()*3)]+"px";

gameArea.appendChild(enemy);

}

function moveEnemy(){

let enemies=document.querySelectorAll(".enemy");

enemies.forEach(function(enemy){

let top=enemy.offsetTop;

top+=speed;

enemy.style.top=top+"px";

let playerRect=player.getBoundingClientRect();

let enemyRect=enemy.getBoundingClientRect();

if(

playerRect.left<enemyRect.right &&
playerRect.right>enemyRect.left &&
playerRect.top<enemyRect.bottom &&
playerRect.bottom>enemyRect.top

){

crash();

}

if(top>600){

enemy.remove();

score++;

speed+=0.15;

document.getElementById("score").innerText="Score: "+score;

}

});

}

function crash(){

running=false;

alert("💥 Crash! Score: "+score);

location.reload();

}

function gameLoop(){

if(!running) return;

moveRoad();

moveEnemy();

requestAnimationFrame(gameLoop);

}

</script>

</body>
</html>
