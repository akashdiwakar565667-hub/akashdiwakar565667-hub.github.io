<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieVerse</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- Background -->
    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">🎬 MovieVerse</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Movies</a>
            <a href="#">Series</a>
            <a href="#">Trending</a>
        </nav>
    </header>

    <!-- Hero -->
    <main class="hero">

        <div class="glass-box">

            <h1>Unlimited Movies & Series</h1>

            <p>
                Watch the latest Movies and TV Shows in a premium cinematic experience.
            </p>

            <div class="search-box">
                <input type="text" placeholder="Search Movies...">
                <button>Search</button>
            </div>

        </div>

    </main>

    <!-- Trending Movies -->
    <section class="movies-section">

        <h2>🔥 Trending Movies</h2>

        <div class="movie-grid">

            <div class="movie-card">
                <img src="https://placehold.co/300x450?text=Movie+1">
                <h3>Movie One</h3>
                <p>⭐ 8.8</p>
                <button>Watch</button>
            </div>

            <div class="movie-card">
                <img src="https://placehold.co/300x450?text=Movie+2">
                <h3>Movie Two</h3>
                <p>⭐ 8.6</p>
                <button>Watch</button>
            </div>

            <div class="movie-card">
                <img src="https://placehold.co/300x450?text=Movie+3">
                <h3>Movie Three</h3>
                <p>⭐ 9.1</p>
                <button>Watch</button>
            </div>

            <div class="movie-card">
                <img src="https://placehold.co/300x450?text=Movie+4">
                <h3>Movie Four</h3>
                <p>⭐ 8.9</p>
                <button>Watch</button>
            </div>

        </div>

    </section>

    <script src="js/script.js"></script>

</body>
</html>
