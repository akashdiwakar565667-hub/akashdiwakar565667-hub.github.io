```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Akash Anime Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0a0a0f;
color:white;
}

/* LOGIN PAGE */

#loginPage{

display:flex;

align-items:center;

justify-content:center;

height:100vh;

flex-direction:column;

}

.login-box{

background:#14141c;

padding:40px;

border-radius:12px;

width:300px;

text-align:center;

}

input{

width:100%;

padding:10px;

margin:10px 0;

border:none;

border-radius:8px;

}

button{

width:100%;

padding:10px;

border:none;

background:#ff2e63;

color:white;

border-radius:8px;

cursor:pointer;

}

a{

color:#ff2e63;

cursor:pointer;

font-size:14px;

}

/* SITE */

#site{

display:none;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 40px;

background:#111;

}

.search{

padding:10px;

border-radius:20px;

border:none;

}

.hero{

padding:70px;

text-align:center;

background:linear-gradient(90deg,#ff2e63,#ff7b00);

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(180px,1fr));

gap:20px;

padding:40px;

}

.card{

background:#14141c;

border-radius:12px;

overflow:hidden;

cursor:pointer;

}

.card img{

width:100%;

height:250px;

object-fit:cover;

}

.info{

padding:10px;

text-align:center;

}

</style>

</head>

<body>

<!-- LOGIN PAGE -->

<div id="loginPage">

<div class="login-box">

<h2>Login</h2>

<input id="email" placeholder="Email">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

<p style="margin-top:10px;">No account? <a onclick="signup()">Signup</a></p>

</div>

</div>

<!-- SITE -->

<div id="site">

<header>

<h2>🔥 Akash Anime Hub</h2>

<input class="search" placeholder="Search..." id="search">

</header>

<div class="hero">

<h1>Hey everyone I'm Akash</h1>

<p>and I'm here for you for free everything</p>

</div>

<div class="grid" id="grid"></div>

</div>

<script>

/* LOGIN */

function signup(){

let email=document.getElementById("email").value;

let pass=document.getElementById("password").value;

localStorage.setItem("userEmail",email);

localStorage.setItem("userPass",pass);

alert("Signup successful");

}

function login(){

let email=document.getElementById("email").value;

let pass=document.getElementById("password").value;

if(

email===localStorage.getItem("userEmail") &&

pass===localStorage.getItem("userPass")

){

document.getElementById("loginPage").style.display="none";

document.getElementById("site").style.display="block";

loadAnime();

}else{

alert("Wrong login");

}

}

/* ANIME */

function loadAnime(){

fetch("https://api.jikan.moe/v4/top/anime")

.then(r=>r.json())

.then(d=>{

const grid=document.getElementById("grid");

d.data.forEach(a=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${a.images.jpg.large_image_url}">

<div class="info">

${a.title}

</div>

`;

card.onclick=()=>{

window.open(`https://watchanimeworld.net/?s=${encodeURIComponent(a.title)}`,"_blank");

};

grid.appendChild(card);

});

});

}

/* SEARCH */

document.getElementById("search").addEventListener("keyup",function(){

let q=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=

card.innerText.toLowerCase().includes(q)

?"block":"none";

});

});

</script>

</body>
</html>
