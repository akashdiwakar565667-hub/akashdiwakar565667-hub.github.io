<!DOCTYPE html>
<html>
<head>
<title>StreamFlix Anime</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:black;
color:red;
font-size:32px;
padding:15px;
font-weight:bold;
}

.searchBox{
text-align:center;
margin-top:25px;
}

.searchBox input{
padding:12px;
width:300px;
font-size:16px;
border:none;
border-radius:6px;
outline:none;
}

.searchBox button{
padding:12px 20px;
font-size:16px;
background:red;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin-left:8px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1a1a1a;
border-radius:8px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.07);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:15px;
text-align:center;
}

footer{
text-align:center;
padding:20px;
background:black;
margin-top:40px;
}

</style>
</head>

<body>

<header>STREAMFLIX</header>

<div class="searchBox">

<input id="searchInput" placeholder="Search any anime...">
<button onclick="searchAnime()">Search</button>

</div>

<h2 style="padding-left:20px;">Top Anime</h2>

<div class="container" id="anime"></div>

<footer>StreamFlix Anime Library</footer>

<script>

function searchAnime(){
let q=document.getElementById("searchInput").value
if(q!=""){
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(q)
}
}

const animeList=[

{name:"Naruto",img:"https://cdn.myanimelist.net/images/anime/13/17405.jpg"},
{name:"Attack on Titan",img:"https://cdn.myanimelist.net/images/anime/10/47347.jpg"},
{name:"Demon Slayer",img:"https://cdn.myanimelist.net/images/anime/1286/99889.jpg"},
{name:"Jujutsu Kaisen",img:"https://cdn.myanimelist.net/images/anime/1171/109222.jpg"},
{name:"Dragon Ball Super",img:"https://cdn.myanimelist.net/images/anime/7/74606.jpg"},
{name:"Hunter x Hunter",img:"https://cdn.myanimelist.net/images/anime/1337/99013.jpg"},
{name:"Tokyo Ghoul",img:"https://cdn.myanimelist.net/images/anime/5/64449.jpg"},
{name:"Bleach",img:"https://cdn.myanimelist.net/images/anime/3/40451.jpg"},
{name:"One Piece",img:"https://cdn.myanimelist.net/images/anime/6/73245.jpg"},
{name:"Death Note",img:"https://cdn.myanimelist.net/images/anime/9/9453.jpg"},
{name:"Chainsaw Man",img:"https://cdn.myanimelist.net/images/anime/1806/126216.jpg"},
{name:"Black Clover",img:"https://cdn.myanimelist.net/images/anime/2/88336.jpg"},
{name:"Solo Leveling",img:"https://cdn.myanimelist.net/images/anime/1803/141097.jpg"},
{name:"Blue Lock",img:"https://cdn.myanimelist.net/images/anime/1258/126929.jpg"},
{name:"Vinland Saga",img:"https://cdn.myanimelist.net/images/anime/1500/103005.jpg"},
{name:"Spy x Family",img:"https://cdn.myanimelist.net/images/anime/1441/122795.jpg"},
{name:"My Hero Academia",img:"https://cdn.myanimelist.net/images/anime/10/78745.jpg"},
{name:"Haikyuu",img:"https://cdn.myanimelist.net/images/anime/7/76014.jpg"},
{name:"Tokyo Revengers",img:"https://cdn.myanimelist.net/images/anime/1839/122012.jpg"},
{name:"Fire Force",img:"https://cdn.myanimelist.net/images/anime/1465/103132.jpg"}

]

const container=document.getElementById("anime")

animeList.forEach(a=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${a.img}">
<h3>${a.name}</h3>
`

card.onclick=()=>{
window.location.href="https://watchanimeworld.net/?s="+encodeURIComponent(a.name)
}

container.appendChild(card)

})

</script>

</body>
</html>
