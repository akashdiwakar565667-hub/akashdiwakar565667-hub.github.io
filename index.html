<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Movies & Anime Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#0f0f14;
  color:#fff;
}
header{
  background:linear-gradient(90deg,#6a11cb,#2575fc);
  padding:20px;
  text-align:center;
  font-size:28px;
  font-weight:600;
  letter-spacing:1px;
}
.search-bar{
  padding:20px;
  text-align:center;
}
.search-bar input{
  width:90%;
  max-width:500px;
  padding:12px 15px;
  border-radius:25px;
  border:none;
  outline:none;
  font-size:16px;
}
.section{
  padding:20px;
}
.section h2{
  margin:0 0 15px 10px;
  font-weight:600;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
  gap:15px;
}
.card{
  background:#1b1b25;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s, box-shadow .2s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 10px 20px rgba(0,0,0,.4);
}
.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}
.card-title{
  padding:10px;
  font-size:14px;
  text-align:center;
}
footer{
  text-align:center;
  padding:20px;
  color:#aaa;
  font-size:13px;
}
.tag{
  display:inline-block;
  background:#2575fc;
  padding:3px 8px;
  border-radius:10px;
  font-size:11px;
  margin-top:6px;
}
</style>
</head>
<body>

<header>🎬 Movies & Anime Hub</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search movies or anime..." onkeyup="searchTitles()" />
</div>

<div class="section">
  <h2>🔥 Popular Movies</h2>
  <div class="grid" id="movies">
    <!-- Movie Cards -->
  </div>
</div>

<div class="section">
  <h2>✨ Popular Anime</h2>
  <div class="grid" id="anime">
    <!-- Anime Cards -->
  </div>
</div>

<footer>
  Demo site • Add your own streaming links
</footer>

<script>
const movies = [
  {title:"Avengers: Endgame",img:"https://image.tmdb.org/t/p/w500/or06FN3Dka5tukK1e9sl16pB3iy.jpg"},
  {title:"Avatar",img:"https://image.tmdb.org/t/p/w500/jRXYjXNq0Cs2TcJjLkki24MLp7u.jpg"},
  {title:"Interstellar",img:"https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqoNMq72nUuHc2.jpg"},
  {title:"John Wick",img:"https://image.tmdb.org/t/p/w500/fZPSd91yGE9fCcCe6OoQr6E3Bev.jpg"},
  {title:"Inception",img:"https://image.tmdb.org/t/p/w500/edv5CZvWj09upOsy2Y6IwDhK8bt.jpg"},
  {title:"The Dark Knight",img:"https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg"}
];

const anime = [
  {title:"Naruto",img:"https://image.tmdb.org/t/p/w500/xppeysfvDKVx775MFuH8Z9BlpMk.jpg"},
  {title:"Attack on Titan",img:"https://image.tmdb.org/t/p/w500/hTP1DtLGFamjfu8WqjnuQdP1n4i.jpg"},
  {title:"Demon Slayer",img:"https://image.tmdb.org/t/p/w500/wP5Ov9ZERcfXELp6Y0zJH6YB0yG.jpg"},
  {title:"Death Note",img:"https://image.tmdb.org/t/p/w500/pN9c8NXpFWVGFbT8uH8M6kRDeoF.jpg"},
  {title:"One Piece",img:"https://image.tmdb.org/t/p/w500/e3NBGiAifW9Xt8xD5tpARskjccO.jpg"},
  {title:"Jujutsu Kaisen",img:"https://image.tmdb.org/t/p/w500/fHpKWq9ayzSk8nSwqRuaAUemRKh.jpg"}
];

function createCard(item, tagText){
  const card = document.createElement('div');
  card.className='card title-item';
  card.innerHTML = `
    <img src="${item.img}" alt="${item.title}">
    <div class="card-title">
      ${item.title}<br>
      <span class="tag">${tagText}</span>
    </div>`;
  return card;
}

function loadContent(){
  const movieBox = document.getElementById('movies');
  const animeBox = document.getElementById('anime');

  movies.forEach(m=>movieBox.appendChild(createCard(m,'Movie')));
  anime.forEach(a=>animeBox.appendChild(createCard(a,'Anime')));
}

function searchTitles(){
  const q = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.title-item').forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(q) ? 'block':'none';
  });
}

loadContent();
</script>

</body>
</html>
