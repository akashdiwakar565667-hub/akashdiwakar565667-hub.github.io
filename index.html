```html
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Anime Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0a0a0f;
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
border-bottom:1px solid #222;
}

.logo{
font-size:26px;
font-weight:600;
color:#ff2e63;
}

.search{
width:260px;
padding:10px;
border-radius:20px;
border:none;
outline:none;
}

/* HERO */

.hero{
height:350px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
font-size:34px;
font-weight:600;
background:linear-gradient(90deg,#ff2e63,#ff7b00);
}

/* SECTION */

.section{
padding:40px;
}

.section h2{
margin-bottom:20px;
}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(180px,1fr));

gap:20px;

}

.card{

background:#14141c;

border-radius:12px;

overflow:hidden;

transition:.3s;

cursor:pointer;

}

.card:hover{

transform:scale(1.07);

box-shadow:0 0 25px rgba(0,0,0,.8);

}

.card img{

width:100%;

height:250px;

object-fit:cover;

}

.info{

padding:10px;

text-align:center;

}

.title{

font-size:14px;

font-weight:500;

}

.watch{

margin-top:8px;

background:#ff2e63;

border:none;

padding:6px 12px;

border-radius:8px;

color:white;

cursor:pointer;

font-size:12px;

}

footer{

text-align:center;

padding:30px;

color:#777;

}

</style>
</head>

<body>

<header>

<div class="logo">🔥 Anime Hub</div>

<input type="text" placeholder="Search anime..." class="search" id="search">

</header>

<div class="hero">

Watch Anime Free Instantly

</div>

<div class="section">

<h2>🔥 Trending Anime</h2>

<div class="grid" id="trending"></div>

</div>

<div class="section">

<h2>⭐ Top Rated Anime</h2>

<div class="grid" id="top"></div>

</div>

<footer>

Anime Hub • Watch via watchanimeworld.net

</footer>

<script>

/* Redirect link */

function redirect(name){

const url=`https://watchanimeworld.net/?s=${encodeURIComponent(name)}`;

window.open(url,"_blank");

}

/* Create card */

function createCard(container,anime){

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${anime.images.jpg.large_image_url}">

<div class="info">

<div class="title">${anime.title}</div>

<button class="watch">Watch</button>

</div>

`;

card.onclick=()=>redirect(anime.title);

container.appendChild(card);

}

/* Trending */

fetch("https://api.jikan.moe/v4/seasons/now")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("trending");

data.data.slice(0,24).forEach(a=>createCard(container,a));

});

/* Top Rated */

fetch("https://api.jikan.moe/v4/top/anime")

.then(res=>res.json())

.then(data=>{

const container=document.getElementById("top");

data.data.slice(0,24).forEach(a=>createCard(container,a));

});

/* Search */

document.getElementById("search").addEventListener("keyup",function(){

let val=this.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(val)?"block":"none";

});

});

</script>

</body>
</html>
